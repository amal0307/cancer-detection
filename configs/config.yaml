project:
  name: "CancerNet"
  seed: 42
  device: "cpu"
  mixed_precision: false

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  image_size: 224
  num_workers: 0
  pin_memory: false

model:
  efficientnet:
    backbone: "efficientnet_b4"
    pretrained: true
    freeze_epochs: 5
    embedding_dim: 1792
  vit:
    backbone: "vit_base_patch16_224"
    pretrained: true
    freeze_epochs: 5
    embedding_dim: 768
  gnn:
    num_node_features: 7
    hidden_dim: 256
    output_dim: 256
    num_layers: 3
    dropout: 0.3
  fusion:
    input_dim: 2816
    num_heads: 8
    temperature_learnable: true
    dropout: 0.3
  classifier:
    hidden_dims: [512, 128]
    num_classes: 2
    dropout: 0.4

training:
  mixed_precision: false
  epochs: 50
  batch_size: 32
  accumulation_steps: 1
  optimizer:
    name: "adamw"
    lr: 1e-4
    weight_decay: 1e-4
    differential_lr:
      backbone_lr_factor: 0.1
  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 5
    min_lr: 1e-6
  loss:
    name: "focal"
    alpha: 0.75
    gamma: 2.0
    label_smoothing: 0.1
  early_stopping:
    patience: 10
    monitor: "val_auc"

augmentation:
  train:
    stain_normalize: true
    stain_method: "macenko"
  val:
    stain_normalize: true
  tta:
    enabled: true
    n_augments: 10

graph:
  n_neighbors: 8
  node_feature_method: "deep"

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  results_dir: "results"
  save_top_k: 3
  log_every_n_steps: 50